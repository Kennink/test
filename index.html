<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nepal Police Contact Directory</title>

<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<header>

<div class="logo">

<i class="fa-solid fa-shield-halved"></i>

</div>

<div>

<h1>नेपाल प्रहरी</h1>

<h3>Lumbini Province Police Office</h3>

</div>

</header>

<div class="search-container">

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input

id="searchInput"

type="text"

placeholder="Search by Name, Rank, Phone, Blood Group..."

onkeyup="searchContact()"

autocomplete="off">

<button id="clearBtn">

<i class="fa-solid fa-xmark"></i>

</button>

</div>

</div>

<div class="stats">

<span id="totalContacts">
  
Loading Contacts...

</span>

</div>

<div id="result">

<div class="welcome">

<i class="fa-solid fa-address-book"></i>

<h2>Police Contact Directory</h2>

<p>

Start typing to search officers.

</p>

</div>

</div>

</div>

<div class="developer">

<a href="tel:98XXXXXXXXXX">

<span>Developed by</span>

<strong>Shishir Luitel</strong>

</a>

</div>

<script src="app.js"></script>

</body>

</html>
